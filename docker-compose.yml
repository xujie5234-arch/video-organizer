version: '3.8'

services:
  media-organizer:
    image: python:3.11-slim
    container_name: media-organizer
    restart: unless-stopped
    working_dir: /app
    
    volumes:
      # 源目录：请修改为你的 115 网盘挂载路径
      - /mnt/115/videos:/source:ro
      
      # 目标目录：分类后存放路径
      - /vol1/1000/docker/media-organizer/target:/target
      
      # 配置文件
      - ./data/config:/app/config
      
      # 代码目录
      - ./app:/app
      
      # 数据库持久化
      - ./data/db:/app/data
    
    ports:
      - "5000:5000"  # Web UI 访问端口
    
    environment:
      - TZ=Asia/Shanghai
      - SOURCE_DIR=/source
      - TARGET_DIR=/target
      - CONFIG_PATH=/app/config/config.yaml
    
    command: >
      sh -c "pip install -r requirements.txt flask && python web_ui.py"
